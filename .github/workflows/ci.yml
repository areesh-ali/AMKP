name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: amkp
          POSTGRES_PASSWORD: amkp
          POSTGRES_DB: amkp
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U amkp -d amkp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://amkp:amkp@localhost:5433/amkp
      PLATFORM_ADMIN_TOKEN: ci-admin-token
      AMKP_JOB_QUEUE: memory
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm --filter @amkp/domain build
          pnpm --filter @amkp/application build
          pnpm --filter @amkp/adapters-postgres build
          pnpm --filter @amkp/adapters-redis build
          pnpm --filter @amkp/adapters-providers build
          pnpm --filter @amkp/api build
          pnpm --filter @amkp/openapi build
          pnpm --filter @amkp/worker build

      - name: Migrate
        run: pnpm --filter @amkp/adapters-postgres exec prisma migrate deploy

      - name: Unit + OpenAPI
        run: |
          pnpm --filter @amkp/application test
          pnpm --filter @amkp/adapters-providers test
          pnpm --filter @amkp/adapters-postgres test
          pnpm --filter @amkp/openapi test

      - name: Auth + isolation + Leak suite (T-1.3 / T-5.x)
        run: pnpm --filter @amkp/api test

      - name: Leak suite reminder
        run: echo "Leak suite runs inside @amkp/api tests (Retrieve/cache/MCP). Set AMKP_LEAK_ALERT_WEBHOOK to page on failure."
