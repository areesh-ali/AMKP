services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: amkp
      POSTGRES_PASSWORD: amkp
      POSTGRES_DB: amkp
    ports:
      - "5433:5432"
    volumes:
      - amkp_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amkp -d amkp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    profiles: ["s3"]
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: amkpminio
      MINIO_ROOT_PASSWORD: amkpminio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - amkp_minio:/data

volumes:
  amkp_pg:
  amkp_minio:
