services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: amkp
      POSTGRES_PASSWORD: amkp
      POSTGRES_DB: amkp
    ports:
      - "5433:5432"
    volumes:
      - amkp_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amkp -d amkp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  amkp_pg:
