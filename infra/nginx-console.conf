server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optional same-origin proxy to API (avoids CORS when VITE_AMKP_BASE_URL is empty/relative)
  location /v1/ {
    proxy_pass http://api:3000/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $http_x_request_id;
    proxy_set_header Authorization $http_authorization;
  }

  location /health {
    proxy_pass http://api:3000/health;
  }

  location /ready {
    proxy_pass http://api:3000/ready;
  }
}
