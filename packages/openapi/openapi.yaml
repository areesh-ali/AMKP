openapi: 3.0.3
info:
  title: AMKP API
  version: 0.1.0
  description: Agentic Multimodal Knowledge Plane — Account & Tenant APIs (T-1.1)
servers:
  - url: http://localhost:3000
    description: Local
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, service]
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
  /v1/accounts:
    post:
      summary: Create Account
      operationId: createAccount
      security:
        - PlatformAdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: Acme Corp
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/accounts/{accountId}/tenants:
    post:
      summary: Create Tenant under Account
      operationId: createTenant
      security:
        - PlatformAdminBearer: []
      parameters:
        - $ref: "#/components/parameters/AccountId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: support
      responses:
        "201":
          description: Tenant created with one-time API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTenantResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      summary: List Tenants for Account
      operationId: listTenants
      security:
        - PlatformAdminBearer: []
      parameters:
        - $ref: "#/components/parameters/AccountId"
      responses:
        "200":
          description: Account-scoped tenant list (never includes apiKey)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/tenants/{tenantId}/api-keys:
    post:
      summary: Create API key for Tenant
      operationId: createApiKey
      security:
        - PlatformAdminBearer: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
      responses:
        "201":
          description: Key created; plaintext returned once
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiKeyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      summary: List API key metadata for Tenant
      operationId: listApiKeys
      security:
        - PlatformAdminBearer: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Metadata only (no plaintext)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/tenants/{tenantId}/api-keys/{apiKeyId}/revoke:
    post:
      summary: Revoke API key
      operationId: revokeApiKey
      security:
        - PlatformAdminBearer: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ApiKeyId"
      responses:
        "200":
          description: Key revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeApiKeyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/tenants/{tenantId}/api-keys/{apiKeyId}/rotate:
    post:
      summary: Rotate API key (revoke old, issue new)
      operationId: rotateApiKey
      security:
        - PlatformAdminBearer: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ApiKeyId"
      responses:
        "201":
          description: New key issued; old revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateApiKeyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/me:
    get:
      summary: Resolve TenantContext from Product API key
      operationId: getMe
      security:
        - TenantApiKeyBearer: []
      responses:
        "200":
          description: Auth-derived tenant context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Resolve TenantContext (body tenant override rejected)
      operationId: postMe
      security:
        - TenantApiKeyBearer: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                tenantId:
                  type: string
                  description: If present and differs from auth → 403
      responses:
        "200":
          description: Auth-derived tenant context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Tenant override forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    PlatformAdminBearer:
      type: http
      scheme: bearer
      description: PLATFORM_ADMIN_TOKEN from environment
    TenantApiKeyBearer:
      type: http
      scheme: bearer
      description: Tenant-scoped amkp_ API key
  parameters:
    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: string
        example: acc_01HZY...
    TenantId:
      name: tenantId
      in: path
      required: true
      schema:
        type: string
        example: ten_01HZY...
    ApiKeyId:
      name: apiKeyId
      in: path
      required: true
      schema:
        type: string
        example: key_01HZY...
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    AccountResponse:
      type: object
      required: [accountId, name, createdAt]
      properties:
        accountId:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
    CreateTenantResponse:
      type: object
      required:
        [tenantId, accountId, name, agenticEnabled, apiKey, createdAt]
      properties:
        tenantId:
          type: string
        accountId:
          type: string
        name:
          type: string
        agenticEnabled:
          type: boolean
          example: false
        apiKey:
          type: string
          description: Plaintext returned once on create; stored hashed only
        createdAt:
          type: string
          format: date-time
    TenantSummary:
      type: object
      required: [tenantId, accountId, name, agenticEnabled, createdAt]
      properties:
        tenantId:
          type: string
        accountId:
          type: string
        name:
          type: string
        agenticEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
    TenantListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TenantSummary"
    CreateApiKeyResponse:
      type: object
      required: [apiKeyId, tenantId, apiKey, createdAt]
      properties:
        apiKeyId:
          type: string
        tenantId:
          type: string
        apiKey:
          type: string
        createdAt:
          type: string
          format: date-time
    ApiKeySummary:
      type: object
      required: [apiKeyId, tenantId, prefix, createdAt, revokedAt]
      properties:
        apiKeyId:
          type: string
        tenantId:
          type: string
        prefix:
          type: string
        createdAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          nullable: true
          format: date-time
    ApiKeyListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ApiKeySummary"
    RevokeApiKeyResponse:
      type: object
      required: [apiKeyId, tenantId, revokedAt]
      properties:
        apiKeyId:
          type: string
        tenantId:
          type: string
        revokedAt:
          type: string
          format: date-time
    RotateApiKeyResponse:
      type: object
      required: [apiKeyId, tenantId, apiKey, revokedApiKeyId, createdAt]
      properties:
        apiKeyId:
          type: string
        tenantId:
          type: string
        apiKey:
          type: string
        revokedApiKeyId:
          type: string
        createdAt:
          type: string
          format: date-time
    MeResponse:
      type: object
      required: [tenantId, accountId]
      properties:
        tenantId:
          type: string
        accountId:
          type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
            message:
              type: string
            request_id:
              type: string
