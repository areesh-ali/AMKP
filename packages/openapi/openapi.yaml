openapi: 3.0.3
info:
  title: AMKP API
  version: 0.1.0
  description: Agentic Multimodal Knowledge Plane — Tenancy, Auth, and Isolation APIs
servers:
  - url: http://localhost:3000
    description: Local
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, service]
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
                  adapters:
                    type: object
                    additionalProperties:
                      type: string
  /ready:
    get:
      summary: Readiness probe (database)
      operationId: getReady
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                type: object
                required: [ok, service, database]
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
                  database:
                    type: string
        "503":
          description: Database unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/accounts:
    post:
      summary: Create Account
      operationId: createAccount
      security:
        - PlatformAdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: Acme Corp
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/accounts/{accountId}/tenants:
    post:
      summary: Create Tenant under Account
      operationId: createTenant
      security:
        - PlatformAdminBearer: []
      parameters:
        - $ref: "#/components/parameters/AccountId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: support
      responses:
        "201":
          description: Tenant created with one-time API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTenantResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      summary: List Tenants for Account
      operationId: listTenants
      security:
        - PlatformAdminBearer: []
      parameters:
        - $ref: "#/components/parameters/AccountId"
      responses:
        "200":
          description: Account-scoped tenant list (never includes apiKey)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/tenants/{tenantId}:
    patch:
      summary: Update Tenant settings (page-vision / agentic / PreferCorrectness)
      operationId: updateTenantSettings
      security:
        - PlatformAdminBearer: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pageVisionEnabled:
                  type: boolean
                agenticEnabled:
                  type: boolean
                preferCorrectnessThreshold:
                  type: number
                  minimum: 0
                  maximum: 1
                  description: Minimum top Evidence score for PreferCorrectness (T-3.3)
                agenticReadinessPassed:
                  type: boolean
                  description: Mark Tenant as agentic-ready (T-4.2)
                agenticOverride:
                  type: boolean
                  description: Audited override to enable agentic without readiness
                actor:
                  type: string
                  description: Required when agenticOverride is true (audit actor)
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantSummary"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/tenants/{tenantId}/api-keys:
    post:
      summary: Create API key for Tenant
      operationId: createApiKey
      security:
        - PlatformAdminBearer: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
      responses:
        "201":
          description: Key created; plaintext returned once
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiKeyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      summary: List API key metadata for Tenant
      operationId: listApiKeys
      security:
        - PlatformAdminBearer: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Metadata only (no plaintext)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/tenants/{tenantId}/api-keys/{apiKeyId}/revoke:
    post:
      summary: Revoke API key
      operationId: revokeApiKey
      security:
        - PlatformAdminBearer: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ApiKeyId"
      responses:
        "200":
          description: Key revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeApiKeyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/tenants/{tenantId}/api-keys/{apiKeyId}/rotate:
    post:
      summary: Rotate API key (revoke old, issue new)
      operationId: rotateApiKey
      security:
        - PlatformAdminBearer: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ApiKeyId"
      responses:
        "201":
          description: New key issued; old revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateApiKeyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/retrieve:
    post:
      summary: Fail-closed single-pass Retrieve (namespace-scoped)
      operationId: retrieve
      security:
        - TenantApiKeyBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                preferCorrectness:
                  type: boolean
                  description: When true, return insufficient_evidence if top score is below Tenant threshold (FR-10)
                mode:
                  type: string
                  enum: [single_pass, agentic]
                  description: Router mode (default single_pass; agentic requires readiness or audited override)
      responses:
        "200":
          description: EvidenceEnvelope for authenticated Tenant only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing TenantContext, tenant override, or agentic readiness gate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/ingest:
    post:
      summary: Ingest a Document (async job)
      operationId: ingestDocument
      security:
        - TenantApiKeyBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename, contentBase64]
              properties:
                filename:
                  type: string
                  example: handbook.pdf
                sourceKey:
                  type: string
                  description: Stable identity for versioning (defaults to filename)
                contentType:
                  type: string
                  example: application/pdf
                contentBase64:
                  type: string
                  description: Base64-encoded document bytes
      responses:
        "202":
          description: Document accepted; ingest job enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/documents:
    get:
      summary: List Documents for authenticated Tenant
      operationId: listDocuments
      security:
        - TenantApiKeyBearer: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Tenant-scoped document list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/documents/{documentId}:
    get:
      summary: Get Document by ID (Tenant-scoped)
      operationId: getDocument
      security:
        - TenantApiKeyBearer: []
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete Document (Tenant-scoped; removes chunks + index rows)
      operationId: deleteDocument
      security:
        - TenantApiKeyBearer: []
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [documentId, deleted]
                properties:
                  documentId:
                    type: string
                  deleted:
                    type: boolean
                    enum: [true]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/documents/{documentId}/reparse:
    post:
      summary: Re-enqueue parse for an existing Document
      operationId: reparseDocument
      security:
        - TenantApiKeyBearer: []
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Parse job enqueued
          content:
            application/json:
              schema:
                type: object
                required: [documentId, jobId, status]
                properties:
                  documentId:
                    type: string
                  jobId:
                    type: string
                  status:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/documents/{documentId}/chunks:
    get:
      summary: List Chunks for a Document (includes parseTier)
      operationId: listDocumentChunks
      security:
        - TenantApiKeyBearer: []
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tenant-scoped chunks with parse ladder metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChunkListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/me:
    get:
      summary: Resolve TenantContext from Product API key
      operationId: getMe
      security:
        - TenantApiKeyBearer: []
      responses:
        "200":
          description: Auth-derived tenant context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Resolve TenantContext (body tenant override rejected)
      operationId: postMe
      security:
        - TenantApiKeyBearer: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                tenantId:
                  type: string
                  description: If present and differs from auth → 403
      responses:
        "200":
          description: Auth-derived tenant context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Tenant override forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/traces/{requestId}:
    get:
      summary: Get retrieve Trace by requestId (Tenant-bound)
      operationId: getTrace
      security:
        - TenantApiKeyBearer: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Trace for the authenticated Tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Trace belongs to another Tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/mcp/tools:
    get:
      summary: List product MCP tools (no admin tools)
      operationId: listMcpTools
      security:
        - TenantApiKeyBearer: []
      responses:
        "200":
          description: Product tool manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpToolManifest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/mcp/tools/retrieve:
    post:
      summary: MCP retrieve tool — EvidenceEnvelope only
      operationId: mcpRetrieve
      security:
        - TenantApiKeyBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                preferCorrectness:
                  type: boolean
                documentIds:
                  type: array
                  items:
                    type: string
                  description: Optional Document ID filter within authenticated Tenant
      responses:
        "200":
          description: EvidenceEnvelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/eval/golden-set:
    post:
      summary: Run golden-set eval against Tenant corpus
      operationId: runGoldenEval
      security:
        - TenantApiKeyBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [questions]
              properties:
                questions:
                  type: array
                  items:
                    type: object
                    required: [id, question]
                    properties:
                      id:
                        type: string
                      question:
                        type: string
                      expectedDocumentIds:
                        type: array
                        items:
                          type: string
                      expectedKeywords:
                        type: array
                        items:
                          type: string
                judge:
                  type: object
                  properties:
                    kind:
                      type: string
                      enum: [lexical_stub, llm]
                    modelId:
                      type: string
      responses:
        "200":
          description: Golden-set report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoldenEvalReport"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/eval/table-rank:
    post:
      summary: TableRank multimodal vs text-only ablation
      operationId: runTableRankEval
      security:
        - TenantApiKeyBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [queries]
              properties:
                queries:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: TableRank ablation report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TableRankEvalReport"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /metrics:
    get:
      summary: Prometheus metrics scrape
      operationId: getMetrics
      responses:
        "200":
          description: Prometheus text exposition format
          content:
            text/plain:
              schema:
                type: string
  /v1/audit:
    get:
      summary: List recent audit entries (platform admin)
      operationId: listAudit
      security:
        - PlatformAdminBearer: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Recent audit entries newest-first
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required: [action, actor, at]
                      properties:
                        action:
                          type: string
                        actor:
                          type: string
                        tenantId:
                          type: string
                        detail:
                          type: object
                          additionalProperties: true
                        at:
                          type: string
                          format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  securitySchemes:
    PlatformAdminBearer:
      type: http
      scheme: bearer
      description: PLATFORM_ADMIN_TOKEN from environment
    TenantApiKeyBearer:
      type: http
      scheme: bearer
      description: Tenant-scoped amkp_ API key
  parameters:
    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: string
        example: acc_01HZY...
    TenantId:
      name: tenantId
      in: path
      required: true
      schema:
        type: string
        example: ten_01HZY...
    ApiKeyId:
      name: apiKeyId
      in: path
      required: true
      schema:
        type: string
        example: key_01HZY...
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    AccountResponse:
      type: object
      required: [accountId, name, createdAt]
      properties:
        accountId:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
    CreateTenantResponse:
      type: object
      required:
        [
          tenantId,
          accountId,
          name,
          agenticEnabled,
          pageVisionEnabled,
          preferCorrectnessThreshold,
          apiKey,
          createdAt,
        ]
      properties:
        tenantId:
          type: string
        accountId:
          type: string
        name:
          type: string
        agenticEnabled:
          type: boolean
          example: false
        pageVisionEnabled:
          type: boolean
          example: false
          description: Opt-in Parse Ladder page-vision / VLM tier (T-2.4)
        preferCorrectnessThreshold:
          type: number
          example: 0.5
          description: PreferCorrectness score floor (T-3.3)
        apiKey:
          type: string
          description: Plaintext returned once on create; stored hashed only
        createdAt:
          type: string
          format: date-time
    TenantSummary:
      type: object
      required:
        [
          tenantId,
          accountId,
          name,
          agenticEnabled,
          pageVisionEnabled,
          preferCorrectnessThreshold,
          createdAt,
        ]
      properties:
        tenantId:
          type: string
        accountId:
          type: string
        name:
          type: string
        agenticEnabled:
          type: boolean
        pageVisionEnabled:
          type: boolean
        preferCorrectnessThreshold:
          type: number
          example: 0.5
        createdAt:
          type: string
          format: date-time
    TenantListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TenantSummary"
    CreateApiKeyResponse:
      type: object
      required: [apiKeyId, tenantId, apiKey, createdAt]
      properties:
        apiKeyId:
          type: string
        tenantId:
          type: string
        apiKey:
          type: string
        createdAt:
          type: string
          format: date-time
    ApiKeySummary:
      type: object
      required: [apiKeyId, tenantId, prefix, createdAt, revokedAt]
      properties:
        apiKeyId:
          type: string
        tenantId:
          type: string
        prefix:
          type: string
        createdAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          nullable: true
          format: date-time
    ApiKeyListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ApiKeySummary"
    RevokeApiKeyResponse:
      type: object
      required: [apiKeyId, tenantId, revokedAt]
      properties:
        apiKeyId:
          type: string
        tenantId:
          type: string
        revokedAt:
          type: string
          format: date-time
    RotateApiKeyResponse:
      type: object
      required: [apiKeyId, tenantId, apiKey, revokedApiKeyId, createdAt]
      properties:
        apiKeyId:
          type: string
        tenantId:
          type: string
        apiKey:
          type: string
        revokedApiKeyId:
          type: string
        createdAt:
          type: string
          format: date-time
    MeResponse:
      type: object
      required: [tenantId, accountId]
      properties:
        tenantId:
          type: string
        accountId:
          type: string
    IngestResponse:
      type: object
      required:
        [
          documentId,
          documentVersionId,
          sourceKey,
          version,
          contentHash,
          jobId,
          status,
          filename,
          contentType,
          byteSize,
        ]
      properties:
        documentId:
          type: string
        documentVersionId:
          type: string
        sourceKey:
          type: string
        version:
          type: integer
        contentHash:
          type: string
        jobId:
          type: string
        status:
          type: string
        filename:
          type: string
        contentType:
          type: string
        byteSize:
          type: integer
    DocumentSummary:
      type: object
      required:
        [
          documentId,
          documentVersionId,
          sourceKey,
          version,
          contentHash,
          filename,
          contentType,
          byteSize,
          status,
          createdAt,
        ]
      properties:
        documentId:
          type: string
        documentVersionId:
          type: string
        sourceKey:
          type: string
        version:
          type: integer
        contentHash:
          type: string
        filename:
          type: string
        contentType:
          type: string
        byteSize:
          type: integer
        status:
          type: string
        createdAt:
          type: string
          format: date-time
    DocumentListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DocumentSummary"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer
    ChunkSummary:
      type: object
      required:
        [
          chunkId,
          documentId,
          parseTier,
          parseConfidence,
          ordinal,
          content,
          createdAt,
        ]
      properties:
        chunkId:
          type: string
        documentId:
          type: string
        parseTier:
          type: string
          enum: [tier1_text, tier2_layout, tier3_page_vision]
        parseConfidence:
          type: number
          minimum: 0
          maximum: 1
        ordinal:
          type: integer
        content:
          type: string
        table:
          $ref: "#/components/schemas/TableEvidence"
        createdAt:
          type: string
          format: date-time
    TableEvidence:
      type: object
      required: [headers, rows]
      properties:
        headers:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            type: array
            items:
              type: string
    ChunkListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ChunkSummary"
    Citation:
      type: object
      required: [documentId]
      additionalProperties: false
      properties:
        documentId:
          type: string
        location:
          type: string
        page:
          type: integer
    CostEstimate:
      type: object
      required: [currency, estimatedUsd]
      additionalProperties: false
      properties:
        currency:
          type: string
          enum: [USD]
        estimatedUsd:
          type: number
        actualUsd:
          type: number
    EvidenceItem:
      type: object
      required: [id, score, citation]
      # No MVP final-answer / chat fields (AD-4 / T-3.2)
      additionalProperties: false
      properties:
        id:
          type: string
        score:
          type: number
        citation:
          $ref: "#/components/schemas/Citation"
        content:
          type: string
        table:
          $ref: "#/components/schemas/TableEvidence"
        parseConfidence:
          type: number
          minimum: 0
          maximum: 1
        parseTier:
          type: string
        documentVersionId:
          type: string
    PreferCorrectnessOutcome:
      oneOf:
        - type: object
          required: [kind, items]
          additionalProperties: false
          properties:
            kind:
              type: string
              enum: [evidence]
            items:
              type: array
              items:
                $ref: "#/components/schemas/EvidenceItem"
        - type: object
          required: [kind, reason, threshold]
          additionalProperties: false
          properties:
            kind:
              type: string
              enum: [insufficient_evidence]
            reason:
              type: string
            threshold:
              type: number
    EvidenceEnvelope:
      type: object
      required: [schemaVersion, requestId, tenantId, outcome, costEstimate]
      # Explicitly forbid chat/generate answer fields on Retrieve
      additionalProperties: false
      properties:
        schemaVersion:
          type: string
          enum: ["1"]
        requestId:
          type: string
        tenantId:
          type: string
        outcome:
          $ref: "#/components/schemas/PreferCorrectnessOutcome"
        costEstimate:
          $ref: "#/components/schemas/CostEstimate"
        routerDecision:
          type: object
          additionalProperties: false
          properties:
            mode:
              type: string
              enum: [single_pass, agentic]
            reasonCode:
              type: string
            hops:
              type: integer
            terminationReason:
              type: string
              enum: [completed, hop_budget, cost_budget]
        # Forbidden MVP answer fields must not appear:
        # answer / finalAnswer / message / completion — not defined here
    TraceHopStep:
      type: object
      required: [hop, tool, query, evidenceIds, costEstimate]
      additionalProperties: false
      properties:
        hop:
          type: integer
        tool:
          type: string
        query:
          type: string
        evidenceIds:
          type: array
          items:
            type: string
        costEstimate:
          $ref: "#/components/schemas/CostEstimate"
    TraceRecord:
      type: object
      required:
        [
          requestId,
          tenantId,
          createdAt,
          routerDecision,
          evidenceIds,
          outcomeKind,
          costEstimate,
          steps,
        ]
      additionalProperties: false
      properties:
        requestId:
          type: string
        tenantId:
          type: string
        createdAt:
          type: string
          format: date-time
        routerDecision:
          type: object
          required: [mode, reasonCode]
          additionalProperties: false
          properties:
            mode:
              type: string
              enum: [single_pass, agentic]
            reasonCode:
              type: string
            hops:
              type: integer
            terminationReason:
              type: string
              enum: [completed, hop_budget, cost_budget]
        evidenceIds:
          type: array
          items:
            type: string
        outcomeKind:
          type: string
          enum: [evidence, insufficient_evidence]
        costEstimate:
          $ref: "#/components/schemas/CostEstimate"
        steps:
          type: array
          items:
            $ref: "#/components/schemas/TraceHopStep"
    McpToolManifest:
      type: object
      required: [schemaVersion, audience, tools, adminTools]
      additionalProperties: false
      properties:
        schemaVersion:
          type: string
          enum: ["1"]
        audience:
          type: string
          enum: [product]
        tools:
          type: array
          items:
            type: object
            required: [name, description, inputSchema]
            properties:
              name:
                type: string
              description:
                type: string
              inputSchema:
                type: object
                additionalProperties: true
        adminTools:
          type: array
          description: Always empty for product credentials
          maxItems: 0
          items:
            type: object
    GoldenEvalReport:
      type: object
      required: [tenantId, requestId, completedAt, judge, summary, outcomes]
      properties:
        tenantId:
          type: string
        requestId:
          type: string
        completedAt:
          type: string
          format: date-time
        judge:
          type: object
          required: [kind, modelId]
          properties:
            kind:
              type: string
              enum: [lexical_stub, llm]
            modelId:
              type: string
              nullable: true
        summary:
          type: object
          required: [total, passed, failed]
          properties:
            total:
              type: integer
            passed:
              type: integer
            failed:
              type: integer
        outcomes:
          type: array
          items:
            type: object
            required:
              [questionId, question, passed, evidenceIds, citationDocumentIds, score, notes]
            properties:
              questionId:
                type: string
              question:
                type: string
              passed:
                type: boolean
              evidenceIds:
                type: array
                items:
                  type: string
              citationDocumentIds:
                type: array
                items:
                  type: string
              score:
                type: number
              notes:
                type: string
    TableRankEvalReport:
      type: object
      required: [tenantId, requestId, completedAt, results, summary]
      properties:
        tenantId:
          type: string
        requestId:
          type: string
        completedAt:
          type: string
          format: date-time
        results:
          type: array
          items:
            type: object
            additionalProperties: true
        summary:
          type: object
          required: [avgMultimodalTableRank, avgTextOnlyTableRank]
          properties:
            avgMultimodalTableRank:
              type: number
            avgTextOnlyTableRank:
              type: number
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
            message:
              type: string
            request_id:
              type: string
